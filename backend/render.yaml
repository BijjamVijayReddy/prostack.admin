services:
  - type: web
    name: prostack-backend
    env: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # Set this in Render Dashboard → Environment
      - key: JWT_SECRET
        sync: false   # Set this in Render Dashboard → Environment
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: FRONTEND_ORIGIN
        sync: false   # Set to your deployed frontend URL e.g. https://your-app.vercel.app
